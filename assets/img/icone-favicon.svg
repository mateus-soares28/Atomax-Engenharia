<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .atom-icon { fill: #D69E2E; }
  </style>
  
  <!-- Círculo central (núcleo) -->
  <circle cx="32" cy="32" r="8" class="atom-icon"/>
  
  <!-- Órbita 1 (horizontal) -->
  <ellipse cx="32" cy="32" rx="20" ry="6" fill="none" stroke="#D69E2E" stroke-width="2" opacity="0.7"/>
  <!-- Elétron 1 -->
  <circle cx="52" cy="32" r="3" class="atom-icon"/>
  
  <!-- Órbita 2 (diagonal) -->
  <ellipse cx="32" cy="32" rx="20" ry="6" fill="none" stroke="#D69E2E" stroke-width="2" opacity="0.7" transform="rotate(60 32 32)"/>
  <!-- Elétron 2 -->
  <circle cx="42" cy="47" r="3" class="atom-icon"/>
  
  <!-- Órbita 3 (diagonal oposta) -->
  <ellipse cx="32" cy="32" rx="20" ry="6" fill="none" stroke="#D69E2E" stroke-width="2" opacity="0.7" transform="rotate(-60 32 32)"/>
  <!-- Elétron 3 -->
  <circle cx="22" cy="47" r="3" class="atom-icon"/>
</svg>